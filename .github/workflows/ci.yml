name: CI

# Runs on every push/PR (docs/13): lint + full test suite across the
# supported Node version matrix. This is a required check, not advisory —
# branch protection on `main` should require it to pass before merge.
"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 22 = Maintenance LTS, 24 = Active LTS as of mid-2026 (see the
        # engines-field note in docs/13 / README — package.json's
        # documented minimum, >=18.0.0, is stale: Node 18 and 20 are both
        # already EOL). This matrix reflects what's actually supported
        # today; bumping the engines field itself is a separate,
        # deliberate semver decision, not folded into this workflow.
        node-version: [22.x, 24.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Verify the package actually builds a clean tarball
        # Catches accidental inclusion of .env, session data, or test
        # fixtures in what `files` in package.json would actually publish
        # (docs/13's pre-publish checklist item 3) — run on every PR, not
        # just at release time, so a bad `files` entry fails fast.
        run: npm pack --dry-run
