name: Publish

# Triggered by pushing a version tag (e.g. `v0.2.0`) — this automates the
# mechanical publish step described in docs/13, it does NOT replace the
# manual pre-publish checklist there (CHANGELOG updated, version bumped
# deliberately, `npm pack --dry-run` reviewed). Re-runs lint + test here
# too rather than trusting that CI already passed on this exact commit,
# since a tag can in principle be pushed independently of a PR merge.
#
# Setup required once, by a repo maintainer, before this can run:
#   Settings -> Secrets and variables -> Actions -> New repository secret
#   named NPM_TOKEN, containing an npm "Automation" access token scoped to
#   this package (https://docs.npmjs.com/creating-and-viewing-access-tokens).
"on":
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Verify tag matches package.json version
        # A mismatched tag/version is exactly the kind of mistake docs/13
        # warns is expensive to walk back on npm — fail loudly here rather
        # than publishing something unexpected.
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
